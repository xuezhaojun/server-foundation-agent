# CronJob: Every Monday Morning
# Creates a Task for each workflow in the list
# Schedule: Monday 09:00 CST (UTC+8) = Monday 01:00 UTC
# Test:
#   kubectl create job test-monday-morning --from=cronjob/every-monday-morning-cron -n server-foundation
#   kubectl get jobs -n server-foundation -l job-name=test-monday-morning
apiVersion: batch/v1
kind: CronJob
metadata:
  name: every-monday-morning-cron
  namespace: server-foundation
  labels:
    app.kubernetes.io/name: every-monday-morning
    app.kubernetes.io/part-of: server-foundation-agent
    app.kubernetes.io/component: scheduler
spec:
  # Monday 09:00 CST (UTC+8) = Monday 01:00 UTC
  schedule: "0 1 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      template:
        spec:
          serviceAccountName: server-foundation-cron-task-creator
          restartPolicy: OnFailure
          containers:
            - name: task-creator
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  # Add workflow files here to run every Monday morning
                  WORKFLOWS="
                    workflows/weekly-pr-report.md
                    workflows/weekly-bot-pr-report.md
                  "

                  for workflow in $WORKFLOWS; do
                    # Derive task name from workflow filename (e.g. weekly-pr-report)
                    task_name=$(basename "$workflow" .md)

                    echo "Creating task for $task_name..."

                    cat <<EOF | kubectl create -f -
                  apiVersion: kubeopencode.io/v1alpha1
                  kind: Task
                  metadata:
                    generateName: ${task_name}-task-
                    namespace: server-foundation
                    labels:
                      app.kubernetes.io/name: ${task_name}
                      app.kubernetes.io/part-of: server-foundation-agent
                      batch.kubeopencode.io/job-type: ${task_name}
                    annotations:
                      kubeopencode.io/triggered-by: cronjob/every-monday-morning-cron
                  spec:
                    agentRef:
                      name: server-foundation-agent
                    description: |
                      Follow @${workflow} to complete the task.
                  EOF

                    echo "Task $task_name created"
                  done

                  echo "All Monday morning tasks created"
